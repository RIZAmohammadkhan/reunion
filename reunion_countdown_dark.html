<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="/public/favicon.png" />
  <title>Class of '26 Reunion Countdown</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;500;700&display=swap');

    :root {
      --bg-color: #050505;
      --text-main: #f4f4f0;
      --text-muted: #8a8a8a;
      --text-dark: #444444;
      --accent: #FFD700;
      --border-color: rgba(255, 255, 255, 0.08);
      /* Custom Cinematic Easing Curve */
      --ease-cinematic: cubic-bezier(0.77, 0, 0.175, 1); 
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      background: var(--bg-color);
      overflow-x: hidden; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- NEW CURTAIN OVERLAY --- */
    .curtain-container {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .curtain-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      background: #000000;
      transition: transform 1s var(--ease-cinematic);
      transition-delay: 0.15s; /* Wait for text to fade before opening */
      z-index: 1;
    }

    .curtain-left {
      left: 0;
      border-right: 1px solid rgba(255, 215, 0, 0.1);
    }

    .curtain-right {
      right: 0;
      border-left: 1px solid rgba(255, 215, 0, 0.1);
    }

    .curtain-content {
      position: relative;
      z-index: 2;
      color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(16px, 4vw, 24px);
      letter-spacing: 8px;
      text-transform: uppercase;
      transition: all 0.3s ease-out;
    }

    .curtain-content span {
      display: block;
      animation: pulseText 1.5s infinite;
    }

    /* Curtain Open State */
    .curtain-container.is-open {
      pointer-events: none;
    }

    .curtain-container.is-open .curtain-left {
      transform: translateX(-100%);
    }

    .curtain-container.is-open .curtain-right {
      transform: translateX(100%);
    }

    .curtain-container.is-open .curtain-content {
      opacity: 0;
      transform: scale(1.1) translateY(-10px); /* Text floats up and blurs away */
      filter: blur(8px);
    }
    /* ----------------------------- */

    .rn-wrap {
      background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, var(--bg-color) 80%);
      min-height: 100vh;
      min-height: 100dvh; 
      font-family: 'Courier Prime', monospace;
      color: var(--text-main);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
      
      /* Main content 3D push back */
      transform: scale(0.95);
      transition: transform 1.2s var(--ease-cinematic);
    }

    /* When app is loaded, main content pushes forward */
    body.app-loaded .rn-wrap {
      transform: scale(1);
    }

    /* Cinematic Texturing */
    .grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      z-index: 2;
    }

    /* Background Dialogues */
    .side-text {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255, 215, 0, 0.15);
      text-transform: uppercase;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
    }

    /* Play animations ONLY after tapping */
    body.app-loaded .side-text {
      animation: sideFadeIn 2s ease forwards;
    }

    .side-left {
      top: 5vh;
      left: 3vw;
      font-size: clamp(30px, 5vw, 100px);
      white-space: nowrap;
    }

    .side-right {
      top: 5vh;
      right: 3vw;
      font-size: clamp(30px, 5vw, 100px);
      white-space: nowrap;
    }

    .side-bottom {
      bottom: 5vh;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      text-align: center;
      font-size: clamp(20px, 3.5vw, 65px);
    }

    /* Center Console */
    .center-console {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 20px;
    }

    .top-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 500;
      letter-spacing: 12px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: clamp(20px, 4vw, 40px);
      opacity: 0;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      text-align: center;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: clamp(8px, 1.5vw, 15px);
      width: 100%;
      max-width: 1000px;
      opacity: 0;
    }

    .countdown-cell {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-top: 2px solid rgba(255, 255, 255, 0.15);
      padding: clamp(12px, 3vw, 30px) 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }

    .countdown-cell:hover {
      border-top-color: var(--accent);
      background: rgba(255, 255, 255, 0.03);
      transform: translateY(-2px);
    }

    .countdown-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 6vw, 75px);
      line-height: 1;
      color: var(--text-main);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .countdown-num.tick {
      animation: pulseColor 0.5s ease-out;
    }

    .countdown-unit {
      font-size: clamp(8px, 1.2vw, 11px);
      letter-spacing: clamp(2px, 0.5vw, 4px);
      color: var(--text-dark);
      text-transform: uppercase;
      margin-top: 14px;
    }

    .date-stamp {
      font-size: clamp(10px, 1.5vw, 13px);
      letter-spacing: clamp(4px, 1vw, 8px);
      color: var(--text-dark);
      text-transform: uppercase;
      margin-top: clamp(30px, 5vw, 50px);
      opacity: 0;
      text-align: center;
    }

    .date-stamp span {
      color: var(--text-muted);
      font-weight: bold;
    }

    /* Staggered Content Animation triggers ONLY after loaded */
    body.app-loaded .top-badge {
      animation: blurIn 1.5s 0.3s ease forwards;
    }
    body.app-loaded .countdown-grid {
      animation: blurIn 1.5s 0.6s ease forwards;
    }
    body.app-loaded .date-stamp {
      animation: blurIn 1.5s 0.9s ease forwards;
    }

    /* Animations */
    @keyframes blurIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(10px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes sideFadeIn {
      0% { opacity: 0; filter: blur(20px); }
      100% { opacity: 1; filter: blur(0); }
    }

    @keyframes pulseColor {
      0% { color: var(--accent); text-shadow: 0 0 20px var(--accent); }
      100% { color: var(--text-main); text-shadow: 0 0 20px rgba(255,255,255,0.1); }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
      50% { opacity: 0.5; text-shadow: 0 0 0px rgba(255, 215, 0, 0); }
    }

    /* Responsive adjustments */
    @media (max-width: 850px) {
      .countdown-grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 600px;
      }
    }

    @media (max-width: 500px) {
      .side-text { -webkit-text-stroke: 1px rgba(255, 215, 0, 0.08); }
      .side-left { top: auto; bottom: 12vh; left: 50%; transform: translateX(-50%); font-size: 24px; }
      .side-right { display: none; }
      .side-bottom { bottom: 4vh; font-size: 18px; line-height: 1.3; }
      
      .countdown-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .countdown-cell { padding: 15px 2px; }
      .countdown-unit { margin-top: 8px; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

<!-- New Split Curtain Reveal -->
<div id="start-overlay" class="curtain-container">
  <div class="curtain-panel curtain-left"></div>
  <div class="curtain-panel curtain-right"></div>
  <div class="curtain-content">
    <span>Tap Anywhere To Enter</span>
  </div>
</div>

<div class="rn-wrap">
  <div class="grain"></div>
  <div class="scanlines"></div>

  <!-- Background Cinematic Dialogues -->
  <div class="side-text side-left">BOL AAYENGA</div>
  <div class="side-text side-right">HAI HIMAT</div>
  <div class="side-text side-bottom">"Tu apni train pakad main apni train pakadta hu"</div>

  <!-- Main Countdown UI -->
  <div class="center-console">
    <div class="top-badge">Class of 2026 Reunion</div>

    <div class="countdown-grid">
      <div class="countdown-cell">
        <div class="countdown-num" id="cd-years">00</div>
        <div class="countdown-unit">Years</div>
      </div>
      <div class="countdown-cell">
        <div class="countdown-num" id="cd-months">00</div>
        <div class="countdown-unit">Months</div>
      </div>
      <div class="countdown-cell">
        <div class="countdown-num" id="cd-days">00</div>
        <div class="countdown-unit">Days</div>
      </div>
      <div class="countdown-cell">
        <div class="countdown-num" id="cd-hours">00</div>
        <div class="countdown-unit">Hours</div>
      </div>
      <div class="countdown-cell">
        <div class="countdown-num" id="cd-mins">00</div>
        <div class="countdown-unit">Mins</div>
      </div>
      <div class="countdown-cell">
        <div class="countdown-num" id="cd-secs">00</div>
        <div class="countdown-unit">Secs</div>
      </div>
    </div>

    <div class="date-stamp">Global Target: <span>15 June 2036 (UTC)</span></div>
  </div>

</div>

<script>
  const targetDate = new Date('2036-06-15T00:00:00Z');
  
  // Audio Setup
  let audioCtx;
  let audioInitialized = false;

  const startOverlay = document.getElementById('start-overlay');

  // Triggered on user's first tap
  function initApp() {
    if (audioInitialized) return;
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    audioInitialized = true;
    
    // 1. Trigger the CSS animations
    startOverlay.classList.add('is-open'); // Opens curtains
    document.body.classList.add('app-loaded'); // Starts the countdown animations
    
    // 2. Remove from DOM after transition completes (1.2 seconds max)
    setTimeout(() => {
      startOverlay.style.display = 'none';
    }, 1200);

    // 3. Play initial tick
    playTick();
  }

  // Bind to click/touch events
  document.addEventListener('click', initApp, { once: true });
  document.addEventListener('touchstart', initApp, { once: true });

  // Synthesizes a mechanical clock "tick" sound natively
  function playTick() {
    if (!audioInitialized || !audioCtx) return;
    const time = audioCtx.currentTime;
    
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    // Create a sharp, mechanical click sound
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1000, time);
    osc.frequency.exponentialRampToValueAtTime(10, time + 0.05);
    
    gainNode.gain.setValueAtTime(0.5, time);
    gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    
    osc.start(time);
    osc.stop(time + 0.05);
  }

  // Padding functionality
  function pad(n, w) {
    return String(Math.floor(n)).padStart(w, '0');
  }

  // Core Tick Function
  function tick() {
    const now = new Date();
    const diff = targetDate.getTime() - now.getTime();

    if (diff <= 0) {
      document.querySelectorAll('.countdown-num').forEach(el => el.textContent = '00');
      return;
    }

    let years = targetDate.getUTCFullYear() - now.getUTCFullYear();
    let months = targetDate.getUTCMonth() - now.getUTCMonth();
    let days = targetDate.getUTCDate() - now.getUTCDate();
    let hours = targetDate.getUTCHours() - now.getUTCHours();
    let mins = targetDate.getUTCMinutes() - now.getUTCMinutes();
    let secs = targetDate.getUTCSeconds() - now.getUTCSeconds();

    if (secs < 0) { secs += 60; mins--; }
    if (mins < 0) { mins += 60; hours--; }
    if (hours < 0) { hours += 24; days--; }
    if (days < 0) {
      const daysInCurrentMonth = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() + 1, 0)).getUTCDate();
      days += daysInCurrentMonth;
      months--;
    }
    if (months < 0) { months += 12; years--; }

    const elSecs = document.getElementById('cd-secs');
    const oldSecs = elSecs.textContent;
    const newSecs = pad(secs, 2);

    if (oldSecs !== newSecs) {
      elSecs.textContent = newSecs;
      
      elSecs.classList.remove('tick');
      void elSecs.offsetWidth; 
      elSecs.classList.add('tick');
      
      playTick();
    }

    document.getElementById('cd-years').textContent = pad(years, 2);
    document.getElementById('cd-months').textContent = pad(months, 2);
    document.getElementById('cd-days').textContent = pad(days, 2);
    document.getElementById('cd-hours').textContent = pad(hours, 2);
    document.getElementById('cd-mins').textContent = pad(mins, 2);
  }

  tick(); 
  setInterval(tick, 100);
</script>

</body>
</html>
