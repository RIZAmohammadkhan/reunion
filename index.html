<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="A cinematic countdown for the Class of 2026 reunion."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Class of '26 Reunion Countdown</title>
  </head>
  <body>
    <div id="start-overlay" class="curtain-container" aria-label="Tap anywhere to enter">
      <div class="curtain-panel curtain-left"></div>
      <div class="curtain-panel curtain-right"></div>
      <div class="curtain-content">
        <span>Tap Anywhere To Enter</span>
      </div>
    </div>

    <main class="rn-wrap">
      <div class="grain"></div>
      <div class="scanlines"></div>

      <div class="side-text side-left">BOL AAYENGA</div>
      <div class="side-text side-right">HAI HIMAT</div>
      <div class="side-text side-bottom">"Tu apni train pakad main apni train pakadta hu"</div>

      <section class="center-console" aria-label="Class of 2026 reunion countdown">
        <p class="top-badge">Class of 2026 Reunion</p>

        <div class="countdown-grid">
          <div class="countdown-cell">
            <div class="countdown-num" id="cd-years">00</div>
            <div class="countdown-unit">Years</div>
          </div>
          <div class="countdown-cell">
            <div class="countdown-num" id="cd-months">00</div>
            <div class="countdown-unit">Months</div>
          </div>
          <div class="countdown-cell">
            <div class="countdown-num" id="cd-days">00</div>
            <div class="countdown-unit">Days</div>
          </div>
          <div class="countdown-cell">
            <div class="countdown-num" id="cd-hours">00</div>
            <div class="countdown-unit">Hours</div>
          </div>
          <div class="countdown-cell">
            <div class="countdown-num" id="cd-mins">00</div>
            <div class="countdown-unit">Mins</div>
          </div>
          <div class="countdown-cell">
            <div class="countdown-num" id="cd-secs">00</div>
            <div class="countdown-unit">Secs</div>
          </div>
        </div>

        <p class="date-stamp">Global Target: <span>15 June 2036 (UTC)</span></p>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
